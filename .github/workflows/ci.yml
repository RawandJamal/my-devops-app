name: CI - Check HTML Project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Verify index.html exists
        run: test -f index.html

      - name: Success message
        run: echo "CI passed: index.html exists."